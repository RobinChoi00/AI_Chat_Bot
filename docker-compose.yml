version: '3.8'

services:
  backend:
    build: 
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    restart: always
    environment:
      # 💡 [데이터 정합성] AWS(UTC) 환경에서 시스템 시간을 로컬 시간대와 강제 동기화
      - TZ=America/Chicago
    env_file:
      - .env
    volumes:
      - ./faiss_index:/app/faiss_index
      - ./db_data:/app/db_data  
    # 💡 [인프라 안정성] EC2 디스크 용량 고갈(Out of Disk) 방지를 위한 로그 제한
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ai_network

  frontend:
    build: 
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    restart: always
    environment:
      - TZ=America/Chicago
    env_file:
      - .env
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ai_network

  admin_dashboard:
    build:
      context: .
      dockerfile: Dockerfile.frontend  
    command: streamlit run app/admin_dashboard.py --server.port 8502
    ports:
      - "8502:8502"
    restart: always
    environment:
      - TZ=America/Chicago
    env_file:
      - .env
    depends_on:
      - backend
    volumes:
      - ./db_data:/app/db_data  
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ai_network

networks:
  ai_network:
    driver: bridge