version: '3.8'

services:
  backend:
    build: 
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    restart: always
    # 💡 [보안/동기화 아키텍처] 모든 서비스에 환경변수를 메모리로 직접 주입합니다.
    env_file:
      - .env
    volumes:
      # - ./.env:/app/.env  👈 [제거됨] 파일 시스템 기반 주입은 보안과 동기화에 취약합니다.
      - ./faiss_index:/app/faiss_index
      - ./db_data:/app/db_data  
    networks:
      - ai_network

  frontend:
    build: 
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    restart: always
    env_file:
      - .env  # 💡 프론트엔드 API 키 참조를 위해 추가
    depends_on:
      - backend
    networks:
      - ai_network

  admin_dashboard:
    build:
      context: .
      dockerfile: Dockerfile.frontend  
    command: streamlit run app/admin_dashboard.py --server.port 8502
    ports:
      - "8502:8502"
    restart: always
    env_file:
      - .env  # 💡 관리자 대시보드 환경변수 주입 추가
    depends_on:
      - backend
    volumes:
      - ./db_data:/app/db_data  
    networks:
      - ai_network

networks:
  ai_network:
    driver: bridge