version: '3.8'

services:
  backend:
    build: 
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    restart: always
    volumes:
      - ./.env:/app/.env
      - ./faiss_index:/app/faiss_index
      - ./db_data:/app/db_data  # 💡 [핵심] 채팅 로그가 저장되는 공유 저장소
    networks:
      - ai_network

  frontend:
    build: 
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    restart: always
    depends_on:
      - backend
    networks:
      - ai_network

  # 👇 👇 [신규 추가: 관리자 대시보드 서비스] 👇 👇
  admin_dashboard:
    build:
      context: .
      dockerfile: Dockerfile.frontend  # Streamlit 앱이므로 프론트엔드 도커파일을 재사용합니다.
    command: streamlit run app/admin_dashboard.py --server.port 8502
    ports:
      - "8502:8502"
    restart: always
    depends_on:
      - backend
    volumes:
      - ./db_data:/app/db_data  # 💡 [중요] 백엔드와 동일한 db_data를 바라봐야 실시간 집계가 됩니다.
    networks:
      - ai_network

networks:
  ai_network:
    driver: bridge