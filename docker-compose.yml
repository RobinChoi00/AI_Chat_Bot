version: '3.8'

services:
  backend:
    build: 
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    restart: always  # 💡 [24/7 무중단 운영] 서버/프로세스가 죽으면 무조건 자동 부활
    volumes:
      - ./.env:/app/.env
      - ./faiss_index:/app/faiss_index  # 💡 호스트의 뇌를 컨테이너로 연결
      - ./db_data:/app/db_data
    networks:
      - ai_network

  frontend:
    build: 
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    restart: always  # 💡 [24/7 무중단 운영] 프론트엔드도 불사조 세팅 적용
    depends_on:
      - backend
    networks:
      - ai_network

networks:
  ai_network:
    driver: bridge