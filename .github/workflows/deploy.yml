name: Titan AI Copilot CI/CD Pipeline

# 💡 [Trigger] main 브랜치에 새로운 코드가 Push될 때만 파이프라인 가동
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest # GitHub이 제공하는 1회용 가상 서버에서 실행

    steps:
      - name: 🚀 Execute Deployment via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "🚀 Starting Deployment Process..."
            
            # 💡 [경고] AWS 서버 내의 프로젝트 폴더 이름이 AI_Chat_Bot이 맞는지 확인하십시오! 
            # 만약 다르다면 아래 경로를 수정해야 합니다.
            cd ~/AI_Chat_Bot
            
            # 1. 깃허브에서 최신 코드(설계도) 당겨오기
            echo "📥 Pulling latest code from main branch..."
            git pull origin main
            
            # 2. 도커 컨테이너 강제 재빌드 및 백그라운드 실행
            echo "🏗️ Building and restarting Docker containers..."
            docker compose up -d --build
            
            # 3. 안 쓰는 잉여 도커 이미지 청소 (디스크 용량 최적화)
            echo "🧹 Cleaning up unused Docker images..."
            docker image prune -f
            
            echo "🎉 Deployment Completed Successfully!"